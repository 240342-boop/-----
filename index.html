<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; margin: 0; padding: 20px; color: #f8fafc; }
        .container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        
        /* Таймер */
        .user-header { font-size: 1.2em; font-weight: bold; color: #38bdf8; text-align: center; }
        .timer-display { color: #f8fafc; font-size: 3em; font-weight: bold; margin: 10px 0; text-align: center; }
        
        /* Панель личных достижений */
        .my-achievements { display: flex; justify-content: center; gap: 10px; margin-top: 10px; min-height: 40px; padding: 10px; background: #0f172a; border-radius: 12px; }
        .badge-item { font-size: 1.5em; cursor: help; filter: grayscale(1); transition: 0.3s; }
        .badge-item.active { filter: grayscale(0); transform: scale(1.2); }

        /* Кнопки */
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-google { background: #4f46e5; }
        .btn-stop { background: #ef4444; }
        .btn-break { background: #f59e0b; color: #1e293b; }
        .btn-exit { background: #64748b; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Рейтинг */
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background: #64748b; }
        .rank-num { width: 25px; font-weight: bold; }

        /* Чат */
        #chatBox { height: 180px; overflow-y: auto; border-radius: 12px; padding: 10px; background: #0f172a; margin-bottom: 10px; font-size: 0.9em; }
        .msg { margin-bottom: 5px; border-left: 2px solid #38bdf8; padding-left: 8px; }
        .chat-input-group { display: flex; gap: 5px; }
        #chatInput { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #334155; color: white; }
        .btn-send { background: #22c55e; border: none; border-radius: 8px; width: 40px; color: white; cursor: pointer; }

        .hidden { display: none; }
        h3 { font-size: 0.9em; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBlock" class="card text-center">
        <h2>Study Monitor</h2>
        <button onclick="signInWithGoogle()" class="btn-main btn-google">Войти через Google</button>
    </div>

    <div id="mainBlock" class="card hidden">
        <div id="userName" class="user-header">Загрузка...</div>
        <div class="timer-display" id="timer">0с</div>
        
        <h3>Мои достижения:</h3>
        <div class="my-achievements" id="myBadges">
            </div>

        <button onclick="endSession()" class="btn-main btn-stop">
            <i class="fas fa-check-circle"></i> Завершить и сохранить
        </button>
        <div class="grid-btns">
            <button onclick="togglePause()" id="pauseBtn" class="btn-main btn-break">Перерыв</button>
            <button onclick="signOut()" class="btn-main btn-exit">Выход</button>
        </div>
    </div>

    <div class="card">
        <h3>🏆 Рейтинг группы</h3>
        <div id="groupList">Загрузка...</div>
    </div>

    <div class="card">
        <h3>💬 Чат</h3>
        <div id="chatBox"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Текст...">
            <button onclick="sendMessage()" class="btn-send">></button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07';
    const SITE_URL = 'https://240342-boop.github.io/-----/'; 

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let seconds = 0;
    let sessionSeconds = 0; 
    let isPaused = false;

    const ACHIEVEMENTS = {
        'early_bird': { icon: '🌅', name: 'Пташка', desc: 'Учеба до 8:00' },
        'night_owl':  { icon: '🦉', name: 'Сова', desc: 'Учеба после 23:00' },
        'marathon':   { icon: '🏃', name: 'Марафонец', desc: 'Сессия > 2 часов' },
        'activist':   { icon: '💬', name: 'Активист', desc: '20+ сообщений' },
        'workaholic': { icon: '🔥', name: 'Трудоголик', desc: '10+ часов всего' }
    };

    window.signInWithGoogle = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: SITE_URL } });
    window.signOut = async () => { await saveProgress(); await supabase.auth.signOut(); location.reload(); };

    // Сохранение в базу
    async function saveProgress() {
        if (!currentUser) return;
        
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        let achs = profile.achievements || [];
        const h = new Date().getHours();

        // Проверка условий
        if (h >= 4 && h < 8 && !achs.includes('early_bird')) achs.push('early_bird');
        if ((h >= 23 || h < 4) && !achs.includes('night_owl')) achs.push('night_owl');
        if (sessionSeconds >= 7200 && !achs.includes('marathon')) achs.push('marathon');
        if (seconds >= 36000 && !achs.includes('workaholic')) achs.push('workaholic');

        await supabase.from("profiles").update({ 
            study_seconds: seconds, 
            last_seen: new Date().toISOString(),
            achievements: achs
        }).eq('id', currentUser.id);

        renderMyBadges(achs);
        fetchGroup(); // Обновляем рейтинг сразу после сохранения
    }

    // Кнопка ЗАВЕРШИТЬ
    window.endSession = async () => {
        if (confirm("Сохранить результат и обнулить текущий таймер?")) {
            await saveProgress();
            sessionSeconds = 0;
            alert("Прогресс успешно записан в рейтинг!");
        }
    };

    window.togglePause = () => {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerText = isPaused ? 'Продолжить' : 'Перерыв';
        document.getElementById('pauseBtn').style.background = isPaused ? '#22c55e' : '#f59e0b';
    };

    function renderMyBadges(userAchs) {
        const container = document.getElementById('myBadges');
        container.innerHTML = Object.keys(ACHIEVEMENTS).map(key => `
            <span class="badge-item ${userAchs.includes(key) ? 'active' : ''}" 
                  title="${ACHIEVEMENTS[key].name}: ${ACHIEVEMENTS[key].desc}">
                ${ACHIEVEMENTS[key].icon}
            </span>
        `).join('');
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h > 0 ? `${h}ч ${m}м` : m > 0 ? `${m}м ${sec}с` : `${sec}с`;
    }

    // Чат
    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentUser) return;

        await supabase.from('messages').insert([{ 
            text, user_name: currentUser.user_metadata.full_name || currentUser.email, user_id: currentUser.id 
        }]);

        const { data: p } = await supabase.from('profiles').select('message_count, achievements').eq('id', currentUser.id).single();
        let count = (p.message_count || 0) + 1;
        let achs = p.achievements || [];
        if (count >= 20 && !achs.includes('activist')) achs.push('activist');
        await supabase.from('profiles').update({ message_count: count, achievements: achs }).eq('id', currentUser.id);
        
        input.value = '';
    };

    async function loadMessages() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(15);
        if (data) {
            document.getElementById('chatBox').innerHTML = data.reverse().map(m => `
                <div class="msg"><b>${m.user_name.split(' ')[0]}:</b> ${m.text}</div>
            `).join('');
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
    }

    // Рейтинг
    async function fetchGroup() {
        const { data } = await supabase.from("profiles").select("*").order('study_seconds', { ascending: false });
        const now = new Date();
        document.getElementById('groupList').innerHTML = (data || []).map((u, i) => {
            const isOnline = (now - new Date(u.last_seen)) < 120000;
            const achs = (u.achievements || []).map(a => ACHIEVEMENTS[a]?.icon).join('');
            return `
                <div class="user-row">
                    <div style="display:flex; align-items:center">
                        <span class="rank-num">${i+1}</span>
                        <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                        <div>
                            <b>${u.username || u.email.split('@')[0]}</b>
                            <div style="font-size:0.8em">${achs}</div>
                        </div>
                    </div>
                    <div class="study-meta">${formatTime(u.study_seconds)}</div>
                </div>`;
        }).join('');
    }

    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('mainBlock').classList.remove('hidden');
            document.getElementById('userName').innerText = user.user_metadata.full_name || user.email;
            
            const { data: p } = await supabase.from("profiles").select("*").eq('id', user.id).single();
            if (p) {
                seconds = p.study_seconds || 0;
                renderMyBadges(p.achievements || []);
            }

            setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    sessionSeconds++;
                    document.getElementById('timer').innerText = formatTime(seconds);
                    if (seconds % 30 === 0) saveProgress();
                }
            }, 1000);
        }
        loadMessages();
        fetchGroup();
        supabase.channel('messages_realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMessages).subscribe();
        setInterval(fetchGroup, 30000);
    }
    init();
</script>
</body>
</html>
