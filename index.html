<sc<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Chat</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #userInfo { display: none; padding: 10px; background: white; align-items: center; gap: 10px; border-bottom: 1px solid #ccc; }
        #userPhoto { width: 40px; height: 40px; border-radius: 50%; }
        #feed { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 70%; position: relative; }
        .sent { align-self: flex-end; background: #0084ff; color: white; }
        .received { align-self: flex-start; background: white; border: 1px solid #ddd; }
        .msg-info { font-size: 0.7em; opacity: 0.7; display: block; margin-top: 5px; }
        #messageForm { display: none; padding: 20px; background: white; gap: 10px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .active { background: #0084ff; color: white; }
        #loginBtn { margin: auto; padding: 15px 30px; font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>

    <button id="loginBtn">Войти через Google</button>

    <div id="userInfo">
        <img id="userPhoto" src="" alt="">
        <span id="userName"></span>
        <button id="logoutBtn">Выйти</button>
    </div>

    <div style="padding: 10px; display: flex; gap: 5px;">
        <button class="tab-btn active" onclick="switchTab('feed')">Общий чат</button>
        <button class="tab-btn" onclick="switchTab('dm')">Личка</button>
    </div>

    <div id="recipientArea" style="display:none; padding: 10px;">
        <input type="email" id="recipientEmail" placeholder="Email получателя">
    </div>

    <div id="feed">Войдите, чтобы видеть сообщения</div>

    <div id="messageForm">
        <input type="text" id="content" placeholder="Сообщение..." style="flex-grow: 1;">
        <button id="mainBtn">Отправить</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // ВСТАВЬ СВОИ ДАННЫЕ ТУТ
        const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'feed';
        let channel = null;

        function getChatId(email1, email2) {
            return [email1.toLowerCase(), email2.toLowerCase()].sort().join('_');
        }

      // Проверка авторизации (исправленный метод)
supabase.auth.onAuthStateChange((event, session) => {
    const user = session?.user;
    if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('messageForm').style.display = 'flex';
        // В Supabase v2 данные лежат в user_metadata
        document.getElementById('userName').innerText = user.user_metadata.full_name || user.email;
        document.getElementById('userPhoto').src = user.user_metadata.avatar_url || '';
        loadData();
    } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('messageForm').style.display = 'none';
        document.getElementById('feed').innerHTML = "Войдите, чтобы видеть чат";
    }
});

        document.getElementById('loginBtn').onclick = () => supabase.auth.signInWithOAuth({ provider: 'google' });
        document.getElementById('logoutBtn').onclick = () => supabase.auth.signOut();

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('recipientArea').style.display = (tab === 'dm') ? 'block' : 'none';
            loadData();
        };

        document.getElementById('recipientEmail').oninput = () => {
            if(currentTab === 'dm') loadData();
        };

        document.getElementById('mainBtn').onclick = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            const text = document.getElementById('content').value.trim();
            const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
            if (!text || (currentTab === 'dm' && !recipient)) return;

            const table = (currentTab === 'dm') ? "messages" : "requests";
            const messageData = {
                name: user.user_metadata.full_name,
                email: user.email.toLowerCase(),
                photo: user.user_metadata.avatar_url,
                text: text
            };

            if (currentTab === 'dm') {
                messageData.recipient_email = recipient;
                messageData.chat_id = getChatId(user.email, recipient);
            }

            const { error } = await supabase.from(table).insert([messageData]);
            if (!error) document.getElementById('content').value = "";
        };

        async function loadData() {
            if (channel) supabase.removeChannel(channel);
            const { data: { user } } = await supabase.auth.getUser();
            const table = (currentTab === 'dm') ? "messages" : "requests";
            
            let query = supabase.from(table).select('*').order('created_at', { ascending: true });
            if (currentTab === 'dm') {
                const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
                if (!recipient) return document.getElementById('feed').innerHTML = "Введите email...";
                query = query.eq('chat_id', getChatId(user.email, recipient));
            }

            const { data } = await query;
            renderMessages(data || [], user);

            channel = supabase.channel('changes').on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: table }, () => loadData()).subscribe();
        }

        function renderMessages(messages, user) {
            const feed = document.getElementById('feed');
            feed.innerHTML = messages.map(msg => `
                <div class="msg ${msg.email === user.email.toLowerCase() ? 'sent' : 'received'}">
                    ${currentTab === 'feed' && msg.email !== user.email ? `<small><b>${msg.name}</b></small><br>` : ''}
                    ${msg.text}
                </div>
            `).join('');
            feed.scrollTop = feed.scrollHeight;
        }
    </script>
</body>
</html>
