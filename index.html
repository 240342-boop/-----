<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Firebase Full</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button#mainBtn:disabled { background: #ccc; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; animation: fadeIn 0.3s ease; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .like-btn, .del-btn { cursor: pointer; border: none; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn { background: #e7f3ff; color: #007bff; }
        .del-btn { background: #fff1f0; color: #ff4d4f; }
        .time { font-size: 11px; color: #999; float: right; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div class="container" style="padding: 15px;">
    <input type="text" id="searchInput" placeholder="Поиск по точному имени..." oninput="filterData()">
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment, deleteDoc, where 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUbl1XEBNtPBmyMAY8D0pnJBUWhjFz8nI",
        authDomain: "gfgfgrt-a2c34.firebaseapp.com",
        projectId: "gfgfgrt-a2c34",
        storageBucket: "gfgfgrt-a2c34.firebasestorage.app",
        messagingSenderId: "210276895649",
        appId: "1:210276895649:web:fc7329085b24aef248d9e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let unsubscribe = null;

    // 1. ФУНКЦИЯ УДАЛЕНИЯ (deleteDoc)
    window.deletePost = async (id) => {
        if (confirm("Удалить эту запись навсегда?")) {
            try {
                await deleteDoc(doc(db, "requests", id));
            } catch (e) {
                console.error("Ошибка при удалении:", e);
            }
        }
    };

    // 2. ФУНКЦИЯ ЛАЙКА (Atomic increment)
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        await updateDoc(docRef, { likes: increment(1) });
    };

    // 3. ФУНКЦИЯ ПУБЛИКАЦИИ
    document.getElementById('mainBtn').onclick = async () => {
        const nameVal = document.getElementById('name').value;
        const emailVal = document.getElementById('email').value;
        
        if(!nameVal || !emailVal) return alert("Заполните поля");

        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "requests"), {
                name: nameVal,
                email: emailVal,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        } catch (e) {
            alert("Ошибка доступа. Проверьте правила Firestore.");
        }
        btn.disabled = false;
    };

    // 4. ФУНКЦИЯ ФИЛЬТРАЦИИ И ОТОБРАЖЕНИЯ (Real-time)
    window.filterData = () => {
        const term = document.getElementById('searchInput').value.trim();
        loadFeed(term);
    };

    function loadFeed(filterTerm = "") {
        // Если есть подписка — отменяем её перед созданием новой
        if (unsubscribe) unsubscribe();

        let q;
        if (filterTerm) {
            // Фильтрация по точному совпадению имени
            q = query(collection(db, "requests"), where("name", "==", filterTerm));
        } else {
            // Обычный запрос с сортировкой по времени
            q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        }

        unsubscribe = onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp?.toDate().toLocaleString() || 'Загрузка...';
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${date}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <div class="actions">
                            <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                            <button class="del-btn" onclick="deletePost('${doc.id}')">🗑 Удалить</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // Инициализация ленты при загрузке
    loadFeed();
</script>
</body>
</html>
