<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебный Монитор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        /* Таймер и Имя */
        .user-header { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; }
        .timer-display { color: #3182ce; font-size: 1.8em; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Кнопки как на скриншоте */
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-stop { background-color: #d9534f; }
        .btn-break { background-color: #ffb800; color: #333; }
        .btn-exit { background-color: #718096; }
        
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Список группы */
        .group-monitor { text-align: left; }
        .group-monitor h3 { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #48bb78; }
        .offline-dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e0; }
        .study-time { font-size: 0.8em; color: #718096; text-align: right; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="authBlock">
            <button onclick="signInWithGoogle()" class="btn-main" style="background: #4285F4;">Войти через Google</button>
        </div>

        <div class="card hidden" id="mainBlock">
            <div class="user-header" id="userName">Загрузка...</div>
            <div class="timer-display">
                <i class="fas fa-stopwatch"></i> <span id="timer">0 сек.</span>
            </div>
            
            <button onclick="stopSession()" class="btn-main btn-stop">
                <i class="fas fa-minus-circle"></i> Завершить сессию
            </button>
            
            <div class="grid-actions">
                <button class="btn-main btn-break"><i class="fas fa-coffee"></i> Перерыв</button>
                <button onclick="signOut()" class="btn-main btn-exit">Выход</button>
            </div>
        </div>

        <div class="card group-monitor">
            <h3><i class="fas fa-users"></i> Монитор группы</h3>
            <div id="groupList"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07'; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let seconds = 0;
        let timerInterval;
        let currentUser = null;

        // --- ЛОГИКА ТАЙМЕРА ---
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = formatTime(seconds);
                // Обновляем "активность" в БД раз в 30 секунд
                if (seconds % 30 === 0) updateActivity();
            }, 1000);
        }

        function formatTime(s) {
            if (s < 60) return `${s} сек.`;
            let m = Math.floor(s / 60);
            return `${m}м ${s % 60}с`;
        }

        // --- РАБОТА С БАЗОЙ ---
        async function updateActivity() {
            if (!currentUser) return;
            // Сохраняем время и текущий момент как "был в сети"
            await supabase.from("profiles").update({ 
                last_seen: new Date().toISOString(),
                study_seconds: seconds 
            }).eq('id', currentUser.id);
        }

        async function fetchGroup() {
            const { data, error } = await supabase.from("profiles").select("*");
            if (error) return;

            const list = document.getElementById('groupList');
            const now = new Date();

            list.innerHTML = data.map(user => {
                // Считаем онлайн, если был активен последние 2 минуты
                const lastSeen = new Date(user.last_seen);
                const isOnline = (now - lastSeen) < 120000; 
                
                return `
                    <div class="user-row">
                        <div class="user-meta">
                            <div class="${isOnline ? 'online-dot' : 'offline-dot'}"></div>
                            <strong>${user.username || 'Студент'}</strong>
                        </div>
                        <div class="study-time">
                            <i class="fas fa-home" style="color: #ed8936"></i> Дома<br>
                            <i class="fas fa-clock"></i> ${formatTime(user.study_seconds || 0)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- АВТОРИЗАЦИЯ ---
        window.signInWithGoogle = async () => {
            await supabase.auth.signInWithOAuth({ provider: 'google' });
        };

        window.signOut = async () => {
            await updateActivity();
            await supabase.auth.signOut();
            location.reload();
        };

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('authBlock').classList.add('hidden');
                document.getElementById('mainBlock').classList.remove('hidden');
                document.getElementById('userName').innerText = user.user_metadata.full_name || user.email;
                
                // Загружаем прогресс пользователя из базы
                const { data: profile } = await supabase.from("profiles").select("study_seconds").eq('id', user.id).single();
                if (profile) seconds = profile.study_seconds || 0;

                startTimer();
            }
            
            fetchGroup();
            setInterval(fetchGroup, 10000); // Обновляем список каждые 10 сек
        }

        init();
    </script>
</body>
</html>
