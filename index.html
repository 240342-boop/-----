<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебный Монитор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        .user-header { font-size: 1.3em; font-weight: bold; margin-bottom: 10px; color: #2d3748; }
        .timer-display { color: #3182ce; font-size: 2em; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        
        .btn-google { background: #4285F4; margin-bottom: 10px; }
        .btn-stop { background-color: #d9534f; margin-bottom: 10px; }
        .btn-exit { background-color: #718096; }
        
        .group-monitor { text-align: left; }
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #48bb78; box-shadow: 0 0 5px #48bb78; }
        .offline { background: #cbd5e0; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBlock" class="card">
        <h2>Вход в систему</h2>
        <p>Для начала отсчета времени водите через Google</p>
        <button onclick="signInWithGoogle()" class="btn-main btn-google">
            <i class="fab fa-google"></i> Войти через Google
        </button>
    </div>

    <div id="mainBlock" class="card hidden">
        <div class="user-header" id="userName">Загрузка...</div>
        <div class="timer-display">
            <i class="fas fa-stopwatch"></i> <span id="timer">0 сек.</span>
        </div>
        
        <button onclick="stopSession()" class="btn-main btn-stop">
            <i class="fas fa-pause-circle"></i> Завершить сессию
        </button>
        
        <button onclick="signOut()" class="btn-main btn-exit">
            <i class="fas fa-sign-out-alt"></i> Выход
        </button>
    </div>

    <div class="card group-monitor">
        <h3 style="margin-top:0;"><i class="fas fa-users"></i> Монитор группы</h3>
        <div id="groupList">Загрузка данных...</div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- НАСТРОЙКИ ---
    const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07';
    
    // ПРЯМАЯ ССЫЛКА НА ТВОЙ РЕПОЗИТОРИЙ
    const SITE_URL = 'https://240342-boop.github.io/-----/'; 

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let seconds = 0;
    let timerInterval;
    let currentUser = null;

    // Авторизация
    window.signInWithGoogle = async () => {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: SITE_URL }
        });
    };

    window.signOut = async () => {
        await saveProgress();
        await supabase.auth.signOut();
        window.location.href = SITE_URL;
    };

    // Сохранение времени в базу
    async function saveProgress() {
        if (!currentUser) return;
        await supabase.from("profiles").update({ 
            study_seconds: seconds,
            last_seen: new Date().toISOString() 
        }).eq('id', currentUser.id);
    }

    // Логика таймера
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = formatTime(seconds);
            // Раз в 30 секунд сохраняем в БД, чтобы не потерять прогресс
            if (seconds % 30 === 0) saveProgress();
        }, 1000);
    }

    function formatTime(s) {
        if (s < 60) return s + " сек.";
        let m = Math.floor(s / 60);
        return m + "м " + (s % 60) + "с";
    }

    // Отображение группы
    async function fetchGroup() {
        const { data, error } = await supabase.from("profiles").select("*").order('study_seconds', { ascending: false });
        if (error) return;

        const list = document.getElementById('groupList');
        const now = new Date();

        list.innerHTML = data.map(user => {
            const lastSeen = new Date(user.last_seen);
            const isOnline = (now - lastSeen) < 60000; // Онлайн если была активность в последнюю минуту
            
            return `
                <div class="user-row">
                    <div>
                        <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                        <strong>${user.username || user.email || 'Аноним'}</strong>
                    </div>
                    <div style="text-align: right; font-size: 0.9em; color: #4a5568;">
                        <i class="fas fa-book-reader"></i> ${formatTime(user.study_seconds || 0)}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Проверка входа при загрузке
    async function init() {
        const { data: { user } } = await supabase.auth.getUser();

        if (user) {
            currentUser = user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('mainBlock').classList.remove('hidden');
            document.getElementById('userName').innerText = user.user_metadata.full_name || user.email;

            // Загружаем прогресс из БД
            const { data: profile } = await supabase.from("profiles").select("study_seconds").eq('id', user.id).single();
            if (profile) seconds = profile.study_seconds || 0;

            startTimer();
        }

        fetchGroup();
        setInterval(fetchGroup, 10000); // Обновляем список каждые 10 сек
    }

    init();
</script>

</body>
</html>
