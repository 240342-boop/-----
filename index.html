<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-body: #0b0e14;
            --bg-card: #161b22;
            --bg-inner: #0d1117;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #8b949e;
            --success: #238636;
            --danger: #da3633;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid #30363d; }
        
        /* СЕССИЯ УЧЕБЫ */
        .timer-box { text-align: center; }
        .timer-box h2 { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin: 0; }
        .time-display { font-size: 3.5rem; font-weight: 800; color: #39d353; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; background: rgba(245, 158, 11, 0.1); color: #f59e0b; font-weight: bold; }

        /* КНОПКИ */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn-primary { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: #30363d; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ВАШ ПРОФИЛЬ (СТАТИСТИКА) */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; text-align: center; border-top: 1px solid #30363d; padding-top: 15px; }
        .stat-val { display: block; font-weight: 800; font-size: 1.1rem; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }

        /* ВКЛАДКИ */
        .tab-nav { display: flex; background: var(--bg-inner); padding: 4px; border-radius: 10px; margin: 10px 0; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }
        .tab-btn.active { background: #30363d; color: white; }

        /* ДОСТИЖЕНИЯ */
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-card { background: var(--bg-inner); padding: 12px; border-radius: 12px; border: 1px solid #30363d; position: relative; opacity: 0.5; filter: grayscale(1); }
        .ach-card.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--accent); }
        .ach-icon { font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .ach-info b { font-size: 0.8rem; display: block; }
        .ach-info span { font-size: 0.65rem; color: var(--text-dim); }

        /* РЕЙТИНГ */
        .user-line { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #30363d; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .avatar-circle { width: 32px; height: 32px; background: #38bdf8; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBlock" class="card text-center">
        <h2>Study Monitor</h2>
        <button onclick="signIn()" class="btn btn-primary" style="width: 100%">Войти через Google</button>
    </div>

    <div id="mainBlock" class="hidden">
        <div class="card timer-box">
            <h2 id="userName">Студент</h2>
            <div class="time-display"><i class="fas fa-stopwatch"></i> <span id="timer">0 сек.</span></div>
            <div class="status-badge" id="statusLabel">УЧЕБА</div>
            
            <div class="btn-row">
                <button id="pauseBtn" onclick="togglePause()" class="btn btn-secondary">Пауза</button>
                <button id="finishBtn" onclick="saveSession()" class="btn btn-danger">Завершить</button>
                <button onclick="signOut()" class="btn btn-secondary">Выход</button>
            </div>

            <div class="stats-grid">
                <div><span class="stat-val" id="st-time">0с</span><span class="stat-label">учеба</span></div>
                <div><span class="stat-val" id="st-sessions">0</span><span class="stat-label">сессий</span></div>
                <div><span class="stat-val" id="st-msgs">0</span><span class="stat-label">сообщ.</span></div>
                <div><span class="stat-val" id="st-achs">0</span><span class="stat-label">достиж.</span></div>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="showTab('rating')">Рейтинг</button>
            <button class="tab-btn" onclick="showTab('achievements')">Достижения</button>
        </div>

        <div id="tab-rating" class="card">
            <div id="ratingList">Загрузка...</div>
        </div>

        <div id="tab-achievements" class="card hidden">
            <div class="ach-grid" id="achGrid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://tcnmxalzmfveerioxlha.supabase.co', 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07');

    let user = null;
    let seconds = 0;
    let isPaused = false;
    let profileData = {};

    const ACH_CONFIG = {
        'first': { icon: '🌱', name: 'Первый шаг', desc: 'Первая сессия' },
        'return': { icon: '🔄', name: 'Возвращение', desc: 'Вернулся к учебе' },
        'marathon': { icon: '⚡', name: 'Легенда', desc: 'Учеба > 2 часов' },
        'work': { icon: '💼', name: 'Трудоголик', desc: 'Накопил 5 часов' }
    };

    // --- ФУНКЦИИ ---
    window.signIn = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    window.signOut = () => { supabase.auth.signOut(); location.reload(); };

    window.showTab = (name) => {
        document.getElementById('tab-rating').classList.toggle('hidden', name !== 'rating');
        document.getElementById('tab-achievements').classList.toggle('hidden', name !== 'achievements');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(name.slice(0,3))));
    };

    window.togglePause = () => {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerText = isPaused ? 'Пуск' : 'Пауза';
        document.getElementById('statusLabel').innerText = isPaused ? 'ПЕРЕРЫВ' : 'УЧЕБА';
    };

    // ГЛАВНОЕ: Исправленное сохранение
    window.saveSession = async () => {
        if (!user) return;
        const btn = document.getElementById('finishBtn');
        btn.disabled = true;

        let newAchs = profileData.achievements || [];
        if (!newAchs.includes('first')) newAchs.push('first');
        if (seconds > 7200 && !newAchs.includes('marathon')) newAchs.push('marathon');

        const { error } = await supabase.from('profiles').upsert({
            id: user.id,
            username: user.user_metadata.full_name || user.email,
            study_seconds: (profileData.study_seconds || 0) + seconds,
            session_count: (profileData.session_count || 0) + 1,
            achievements: newAchs,
            last_seen: new Date().toISOString()
        });

        if (error) {
            alert("Ошибка сохранения: " + error.message);
        } else {
            alert("Успешно сохранено!");
            location.reload(); // Перезагружаем для чистоты статистики
        }
        btn.disabled = false;
    };

    async function loadData() {
        const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        if (p) {
            profileData = p;
            document.getElementById('st-time').innerText = formatTime(p.study_seconds);
            document.getElementById('st-sessions').innerText = p.session_count || 0;
            document.getElementById('st-msgs').innerText = p.message_count || 0;
            document.getElementById('st-achs').innerText = (p.achievements || []).length;
            renderAchs(p.achievements || []);
        }
        
        const { data: list } = await supabase.from('profiles').select('*').order('study_seconds', { ascending: false });
        document.getElementById('ratingList').innerHTML = (list || []).map((u, i) => `
            <div class="user-line">
                <div class="user-meta">
                    <b>${i+1}</b>
                    <div class="avatar-circle">${(u.username || 'S')[0]}</div>
                    <span>${u.username || 'Студент'}</span>
                </div>
                <b>${formatTime(u.study_seconds)}</b>
            </div>
        `).join('');
    }

    function renderAchs(unlocked) {
        document.getElementById('achGrid').innerHTML = Object.entries(ACH_CONFIG).map(([id, a]) => `
            <div class="ach-card ${unlocked.includes(id) ? 'unlocked' : ''}">
                <span class="ach-icon">${a.icon}</span>
                <div class="ach-info"><b>${a.name}</b><span>${a.desc}</span></div>
            </div>
        `).join('');
    }

    function formatTime(s) {
        if (!s) return "0с";
        if (s < 60) return s + "с";
        let m = Math.floor(s / 60);
        return m + "м";
    }

    // Инициализация
    async function init() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            user = data.user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('mainBlock').classList.remove('hidden');
            document.getElementById('userName').innerText = user.user_metadata.full_name || user.email;
            
            await loadData();
            
            setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    document.getElementById('timer').innerText = seconds + " сек.";
                }
            }, 1000);
        }
    }
    init();
</script>
</body>
</html>
