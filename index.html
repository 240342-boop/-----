<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Monitor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0b0e14;
            --bg-card: #161b22;
            --bg-inner: #0d1117;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #8b949e;
            --success: #39d353;
            --danger: #da3633;
            --warning: #f59e0b;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-deep); color: var(--text-main); margin: 0; padding: 15px; line-height: 1.4; }
        .container { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* КАРТОЧКИ */
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 15px 0; font-size: 0.9rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        /* ТАЙМЕР СЕССИИ */
        .timer-box { text-align: center; }
        .time-display { font-size: 3.5rem; font-weight: 800; color: var(--success); margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; background: rgba(245, 158, 11, 0.1); color: var(--warning); font-weight: bold; }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn-start { background: rgba(57, 211, 83, 0.15); color: var(--success); border: 1px solid var(--success); }
        .btn-stop { background: var(--danger); color: white; }
        .btn-gray { background: #30363d; color: white; }

        /* СТАТИСТИКА ПРОФИЛЯ */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: 800; font-size: 1.1rem; }
        .stat-lab { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }

        /* ВЫБОР СТАТУСА */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .status-btn { background: var(--bg-inner); border: 1px solid #30363d; color: var(--text-dim); padding: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; text-align: left; }
        .status-btn.active { border-color: var(--accent); color: white; background: rgba(56, 189, 248, 0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* ВКЛАДКИ */
        .tab-nav { display: flex; background: var(--bg-inner); padding: 4px; border-radius: 12px; margin-top: 10px; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; border-radius: 10px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: #30363d; color: white; }

        /* СПИСОК РЕЙТИНГА */
        .user-line { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #30363d; }
        .user-line:last-child { border: none; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { width: 20px; font-weight: 800; color: var(--text-dim); font-size: 0.9rem; }
        .avatar { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }

        /* СЕТКА ДОСТИЖЕНИЙ */
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-card { background: var(--bg-inner); padding: 15px; border-radius: 16px; border: 1px solid #30363d; opacity: 0.4; filter: grayscale(1); transition: 0.3s; position: relative; }
        .ach-card.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--accent); }
        .ach-icon { font-size: 1.6rem; margin-bottom: 8px; display: block; }
        .ach-title { font-weight: bold; font-size: 0.85rem; display: block; }
        .ach-desc { font-size: 0.65rem; color: var(--text-dim); display: block; margin-top: 4px; }
        .ach-label { display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 4px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBlock" class="card text-center">
        <h2 style="margin:0 0 10px 0">Study Monitor</h2>
        <button onclick="signIn()" class="btn btn-start" style="width:100%">Войти через Google</button>
    </div>

    <div id="mainBlock" class="hidden">
        <div class="card timer-box">
            <h3 id="displayUserName">Загрузка...</h3>
            <div class="time-display">
                <i class="fas fa-stopwatch"></i> <span id="timer">0 сек.</span>
            </div>
            <div class="status-badge" id="pauseLabel">УЧЕБА</div>
            
            <div class="btn-row">
                <button id="toggleBtn" onclick="toggleTimer()" class="btn btn-start">Продолжить</button>
                <button id="finishBtn" onclick="saveAndFinish()" class="btn btn-stop">Завершить</button>
                <button onclick="signOut()" class="btn btn-gray">Выход</button>
            </div>

            <div class="stats-row">
                <div class="stat-item"><span class="stat-val" id="stat-time">0с</span><span class="stat-lab">учеба</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-sess">0</span><span class="stat-lab">сессий</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-msg">0</span><span class="stat-lab">сообщ.</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-ach">0</span><span class="stat-lab">достиж.</span></div>
            </div>
        </div>

        <div class="card">
            <h3>Ваш текущий статус</h3>
            <div class="status-grid">
                <button class="status-btn active" onclick="updateStatus('online', this)"><span class="dot" style="background:#238636"></span> В сети</button>
                <button class="status-btn" onclick="updateStatus('away', this)"><span class="dot" style="background:#f59e0b"></span> Отошел</button>
                <button class="status-btn" onclick="updateStatus('busy', this)"><span class="dot" style="background:#da3633"></span> Занят</button>
                <button class="status-btn" onclick="updateStatus('dnd', this)"><span class="dot" style="background:#8b949e"></span> Не беспокоить</button>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('rating')"><i class="fas fa-trophy"></i> Рейтинг</button>
            <button class="tab-btn" onclick="switchTab('achs')"><i class="fas fa-award"></i> Достижения</button>
        </div>

        <div id="tab-rating" class="card">
            <h3>Топ студентов</h3>
            <div id="ratingList">Загрузка...</div>
        </div>

        <div id="tab-achs" class="card hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <h3 style="margin:0">Все достижения</h3>
                <span id="achScore" style="color:var(--accent); font-weight:bold; font-size:0.8rem">0/14</span>
            </div>
            <div class="ach-grid" id="achGrid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://tcnmxalzmfveerioxlha.supabase.co', 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07');

    let user = null;
    let seconds = 0;
    let isPaused = true;
    let userProfile = {};
    let currentStatus = 'online';

    const ACH_LIST = {
        'first': { icon: '🌱', name: 'Первый шаг', desc: 'Провел первую учебную сессию', rarity: 'Обычное', color: '#238636' },
        'return': { icon: '🔄', name: 'Возвращение', desc: 'Вернулся к учебе после перерыва', rarity: 'Обычное', color: '#238636' },
        'legend': { icon: '⚡', name: 'Легенда', desc: 'Накопил 20 часов учебы суммарно', rarity: 'Легендарное', color: '#fbbf24' },
        'work': { icon: '💼', name: 'Трудоголик', desc: 'Накопил 5 часов учебы суммарно', rarity: 'Редкое', color: '#38bdf8' }
    };

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    window.signIn = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    window.signOut = () => { supabase.auth.signOut(); location.reload(); };

    window.switchTab = (name) => {
        document.getElementById('tab-rating').classList.toggle('hidden', name !== 'rating');
        document.getElementById('tab-achs').classList.toggle('hidden', name !== 'achs');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerHTML.toLowerCase().includes(name.slice(0,3))));
    };

    window.updateStatus = (val, el) => {
        currentStatus = val;
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    };

    window.toggleTimer = () => {
        isPaused = !isPaused;
        const btn = document.getElementById('toggleBtn');
        btn.innerHTML = isPaused ? 'Продолжить' : 'Пауза';
        btn.className = isPaused ? 'btn btn-start' : 'btn btn-gray';
        document.getElementById('pauseLabel').innerText = isPaused ? 'ПЕРЕРЫВ' : 'УЧЕБА';
    };

    // --- ЛОГИКА СОХРАНЕНИЯ (Исправление рейтинга) ---
    window.saveAndFinish = async () => {
        if (!user) return;
        const btn = document.getElementById('finishBtn');
        btn.disabled = true;

        let achs = userProfile.achievements || [];
        if (!achs.includes('first')) achs.push('first');
        if ((userProfile.study_seconds + seconds) >= 18000 && !achs.includes('work')) achs.push('work');

        const { error } = await supabase.from('profiles').upsert({
            id: user.id,
            username: user.user_metadata.full_name || user.email,
            study_seconds: (userProfile.study_seconds || 0) + seconds,
            session_count: (userProfile.session_count || 0) + 1,
            status: currentStatus,
            achievements: achs,
            last_seen: new Date().toISOString()
        });

        if (error) alert("Ошибка: " + error.message);
        else { alert("Сессия сохранена!"); location.reload(); }
    };

    function formatTime(s) {
        if (!s || s === 0) return "0с";
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h > 0 ? `${h}ч ${m}м` : m > 0 ? `${m}м` : `${sec}с`;
    }

    // --- ОБНОВЛЕНИЕ ДАННЫХ ---
    async function updateUI() {
        // 1. Личный профиль
        const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        if (p) {
            userProfile = p;
            document.getElementById('stat-time').innerText = formatTime(p.study_seconds);
            document.getElementById('stat-sess').innerText = p.session_count || 0;
            document.getElementById('stat-msg').innerText = p.message_count || 0;
            document.getElementById('stat-ach').innerText = (p.achievements || []).length;
            
            // Рендер достижений
            const unlocked = p.achievements || [];
            document.getElementById('achGrid').innerHTML = Object.entries(ACH_LIST).map(([id, a]) => `
                <div class="ach-card ${unlocked.includes(id) ? 'unlocked' : ''}">
                    <span class="ach-icon">${a.icon}</span>
                    <span class="ach-title">${a.name}</span>
                    <span class="ach-desc">${a.desc}</span>
                    <span class="ach-label" style="background:rgba(0,0,0,0.3); color:${a.color}">${a.rarity}</span>
                </div>
            `).join('');
            document.getElementById('achScore').innerText = `${unlocked.length}/14`;
        }

        // 2. Рейтинг (ИСПРАВЛЕННАЯ СОРТИРОВКА)
        const { data: list } = await supabase.from('profiles').select('*').order('study_seconds', { ascending: false });
        document.getElementById('ratingList').innerHTML = (list || []).map((u, i) => `
            <div class="user-line">
                <div class="user-info">
                    <span class="rank-num">${i+1}</span>
                    <div class="avatar">${(u.username || 'S')[0]}</div>
                    <span>${u.username || 'Студент'}</span>
                </div>
                <b style="color:var(--success)">${formatTime(u.study_seconds)}</b>
            </div>
        `).join('');
    }

    async function init() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            user = data.user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('mainBlock').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = user.user_metadata.full_name || user.email;
            
            await updateUI();
            setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    document.getElementById('timer').innerText = seconds + " сек.";
                }
            }, 1000);
        }
    }
    init();
</script>
</body>
</html>
