<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUbl1XEBNtPBmyMAY8D0pnJBUWhjFz8nI",
        authDomain: "gfgfgrt-a2c34.firebaseapp.com",
        projectId: "gfgfgrt-a2c34",
        storageBucket: "gfgfgrt-a2c34.firebasestorage.app",
        messagingSenderId: "210276895649",
        appId: "1:210276895649:web:fc7329085b24aef248d9e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    let unsubscribe = null;
    let currentTab = 'feed';

    // Функция для создания общего ID чата для двух людей
    function getChatId(email1, email2) {
        return [email1, email2].sort().join('_');
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'flex';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            loadData();
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messageForm').style.display = 'none';
            document.getElementById('feed').innerHTML = "Войдите, чтобы видеть чат";
        }
    });

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('recipientArea').style.display = (tab === 'dm') ? 'block' : 'none';
        loadData();
    };

    // Слушатель изменения Email получателя, чтобы обновлять чат в реальном времени при вводе
    document.getElementById('recipientEmail').oninput = () => {
        if(currentTab === 'dm') loadData();
    };

    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('content').value.trim();
        const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
        
        if (!text) return;
        if (currentTab === 'dm' && !recipient) return alert("Укажите Email!");

        try {
            const myEmail = auth.currentUser.email.toLowerCase();
            const isDM = currentTab === 'dm';
            const colName = isDM ? "messages" : "requests";
            
            const messageData = {
                name: auth.currentUser.displayName,
                email: myEmail,
                photo: auth.currentUser.photoURL,
                text: text,
                timestamp: serverTimestamp()
            };

            if (isDM) {
                messageData.recipientEmail = recipient;
                // Добавляем общий ID чата
                messageData.chatId = getChatId(myEmail, recipient);
            }

            await addDoc(collection(db, colName), messageData);
            document.getElementById('content').value = "";
        } catch (e) {
            console.error("Ошибка Firebase:", e);
            alert("Ошибка: " + e.message);
        }
    };

    function loadData() {
        if (unsubscribe) unsubscribe();
        const feed = document.getElementById('feed');
        const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
        
        let q;
        if (currentTab === 'dm') {
            if (!recipient) {
                feed.innerHTML = "<p style='text-align:center; color:#999;'>Введите email, чтобы начать переписку</p>";
                return;
            }
            const myEmail = auth.currentUser.email.toLowerCase();
            const chatId = getChatId(myEmail, recipient);
            
            // Простой запрос по chatId не требует составного индекса
            q = query(
                collection(db, "messages"),
                where("chatId", "==", chatId),
                orderBy("timestamp", "asc")
            );
        } else {
            q = query(collection(db, "requests"), orderBy("timestamp", "asc"), limit(50));
        }

        unsubscribe = onSnapshot(q, (snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const isMine = data.email === auth.currentUser.email.toLowerCase();
                const time = data.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                
                const div = document.createElement('div');
                div.className = `msg ${isMine ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${!isMine && currentTab === 'feed' ? `<small><b>${data.name}</b></small><br>` : ''}
                    ${data.text}
                    <span class="msg-info">${time}</span>
                `;
                feed.appendChild(div);
            });
            feed.scrollTop = feed.scrollHeight;
        }, (err) => {
            console.error("Ошибка при чтении:", err);
            // Если индекс всё же потребуется (из-за orderBy), Firebase выдаст ссылку в консоль
        });
    }

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>
