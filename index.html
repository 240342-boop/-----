<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Social DM App</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Авторизация */
        .auth-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; justify-content: center; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #007bff; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* Кнопки */
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.3s; }
        #loginBtn, .main-btn { background: #007bff; color: white; padding: 12px; width: 100%; }
        #logoutBtn { background: #ff4757; color: white; padding: 8px 15px; font-size: 14px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; }
        .tab-btn.active { background: #007bff; color: white; }
        button:disabled { background: #ccc !important; }

        /* Стили сообщений */
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; position: relative; animation: fadeIn 0.3s ease; }
        .post.dm { border-left: 5px solid #28a745; background: #f9fff9; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .like-btn { background: #e7f3ff; color: #007bff; padding: 5px 12px; border-radius: 20px; }
        .del-btn { background: #fff1f0; color: #ff4d4f; padding: 5px 12px; border-radius: 20px; }
        .time { font-size: 11px; color: #999; margin-left: auto; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google</button>
    <div id="userInfo" style="display: none;">
        <div class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
            <span id="userName" style="font-weight: bold;"></span>
            <button id="logoutBtn">Выйти</button>
        </div>
    </div>
</div>

<div id="navTabs" class="container" style="display: none; padding: 5px; display: flex; gap: 5px; background: transparent; box-shadow: none;">
    <button class="tab-btn active" onclick="switchTab('feed')">Общая лента</button>
    <button class="tab-btn" onclick="switchTab('dm')">Личные (DM)</button>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3 id="formTitle">Что у вас нового?</h3>
    <input type="email" id="recipientEmail" placeholder="Email получателя (только для DM)" style="display: none;">
    <input type="text" id="content" placeholder="Ваше сообщение...">
    <button id="mainBtn" class="main-btn">Опубликовать</button>
</div>

<div id="searchBar" class="container" style="padding: 15px;">
    <input type="text" id="searchInput" placeholder="Поиск по имени автора..." oninput="filterData()">
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, deleteDoc, where, or } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUbl1XEBNtPBmyMAY8D0pnJBUWhjFz8nI",
        authDomain: "gfgfgrt-a2c34.firebaseapp.com",
        projectId: "gfgfgrt-a2c34",
        storageBucket: "gfgfgrt-a2c34.firebasestorage.app",
        messagingSenderId: "210276895649",
        appId: "1:210276895649:web:fc7329085b24aef248d9e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    let unsubscribe = null;
    let currentTab = 'feed'; // 'feed' или 'dm'

    // --- ЭЛЕМЕНТЫ ---
    const loginBtn = document.getElementById('loginBtn');
    const userInfo = document.getElementById('userInfo');
    const messageForm = document.getElementById('messageForm');
    const recipientInput = document.getElementById('recipientEmail');
    const formTitle = document.getElementById('formTitle');
    const mainBtn = document.getElementById('mainBtn');

    // --- АВТОРИЗАЦИЯ ---
    loginBtn.onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginBtn.style.display = 'none';
            userInfo.style.display = 'block';
            messageForm.style.display = 'block';
            document.getElementById('navTabs').style.display = 'flex';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            loadData();
        } else {
            loginBtn.style.display = 'block';
            userInfo.style.display = 'none';
            messageForm.style.display = 'none';
            document.getElementById('navTabs').style.display = 'none';
            document.getElementById('feed').innerHTML = "";
        }
    });

    // --- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ---
    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if (tab === 'dm') {
            recipientInput.style.display = 'block';
            formTitle.innerText = 'Личное сообщение';
            mainBtn.innerText = 'Отправить DM';
        } else {
            recipientInput.style.display = 'none';
            formTitle.innerText = 'Что у вас нового?';
            mainBtn.innerText = 'Опубликовать в облако';
        }
        loadData();
    };

    // --- РАБОТА С ДАННЫМИ ---
    mainBtn.onclick = async () => {
        const text = document.getElementById('content').value;
        const recipient = recipientInput.value.trim();
        
        if (!text) return alert("Напишите текст");
        if (currentTab === 'dm' && !recipient) return alert("Укажите Email получателя");

        mainBtn.disabled = true;
        try {
            const colName = currentTab === 'dm' ? "messages" : "requests";
            const payload = {
                name: auth.currentUser.displayName,
                email: auth.currentUser.email,
                photo: auth.currentUser.photoURL,
                text: text,
                timestamp: serverTimestamp()
            };

            if (currentTab === 'dm') {
                payload.recipientEmail = recipient;
            } else {
                payload.likes = 0;
            }

            await addDoc(collection(db, colName), payload);
            document.getElementById('content').value = "";
            if(currentTab === 'dm') recipientInput.value = "";
            
        } catch (e) {
            alert("Ошибка доступа или прав!");
        }
        mainBtn.disabled = false;
    };

    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };

    window.deletePost = async (col, id) => {
        if (confirm("Удалить это сообщение?")) {
            await deleteDoc(doc(db, col, id));
        }
    };

    // --- ЗАГРУЗКА ЛЕНТЫ / DM ---
    window.filterData = () => loadData(document.getElementById('searchInput').value.trim());

    function loadData(filterTerm = "") {
        if (unsubscribe) unsubscribe();
        const feedContainer = document.getElementById('feed');
        
        let q;
        if (currentTab === 'dm') {
            // Личные сообщения: где я отправитель ИЛИ я получатель
            q = query(
                collection(db, "messages"),
                or(
                    where("email", "==", auth.currentUser.email),
                    where("recipientEmail", "==", auth.currentUser.email)
                ),
                orderBy("timestamp", "desc")
            );
        } else {
            // Общая лента
            if (filterTerm) {
                q = query(collection(db, "requests"), where("name", "==", filterTerm));
            } else {
                q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            }
        }

        unsubscribe = onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const isDM = currentTab === 'dm';
                const date = data.timestamp?.toDate().toLocaleString() || '...';
                const isMine = data.email === auth.currentUser.email;

                feedContainer.innerHTML += `
                    <div class="post ${isDM ? 'dm' : ''}">
                        <div class="post-header">
                            <img src="${data.photo || ''}" style="width:30px; border-radius:50%">
                            <b>${data.name}</b>
                            ${isDM ? `<small>⟶ ${data.recipientEmail}</small>` : ''}
                            <span class="time">${date}</span>
                        </div>
                        <p>${data.text}</p>
                        <div class="actions">
                            ${!isDM ? `<button class="like-btn" onclick="processLike('${docSnap.id}')">👍 ${data.likes || 0}</button>` : ''}
                            ${isMine ? `<button class="del-btn" onclick="deletePost('${isDM ? 'messages' : 'requests'}', '${docSnap.id}')">🗑 Удалить</button>` : ''}
                        </div>
                    </div>
                `;
            });
        }, (error) => {
            console.error(error);
            if(error.code === 'failed-precondition') alert("Нужно создать индекс в консоли Firebase (ссылка в логах)");
        });
    }
</script>
</body>
</html>
