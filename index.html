<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monitor Pro - Dark Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0b0e14;
            --bg-card: #161b22;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Основная карточка сессии */
        .card { background: var(--bg-card); border-radius: 24px; padding: 20px; border: 1px solid #30363d; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        .timer-header { text-align: center; font-size: 1.1em; color: var(--text-dim); margin-bottom: 5px; }
        .timer-val { font-size: 3.5rem; font-weight: 800; text-align: center; color: var(--success); margin: 10px 0; text-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }

        /* Сетка управления */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 0.95rem; }
        .btn:active { transform: scale(0.96); }
        
        .btn-start { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
        .btn-stop { background: var(--danger); color: white; grid-column: span 1; }
        .btn-exit { background: #30363d; color: var(--text-main); }
        .btn-full { grid-column: span 2; }

        /* Профиль мини */
        .profile-mini { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--success); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }

        /* Вкладки как на скриншоте */
        .tabs-nav { display: flex; background: #0b0e14; padding: 5px; border-radius: 14px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-weight: 600; font-size: 0.85rem; }
        .tab-btn.active { background: #30363d; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Достижения (Сетка 2х2) */
        .achievements-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ach-item { background: #0b0e14; padding: 15px; border-radius: 18px; border: 1px solid #30363d; opacity: 0.4; filter: grayscale(1); transition: 0.4s; position: relative; }
        .ach-item.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .ach-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .ach-title { font-weight: 700; font-size: 0.9rem; display: block; }
        .ach-desc { font-size: 0.7rem; color: var(--text-dim); display: block; margin-top: 4px; }
        
        .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; color: var(--text-dim); }
        .ach-item.unlocked .lock-icon { display: none; }

        /* Рейтинг */
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #30363d; }
        .rank-info { display: flex; align-items: center; gap: 10px; }
        .rank-pos { font-weight: 800; color: var(--text-dim); width: 20px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="authBlock" class="card text-center">
        <h1 style="margin-top:0">Study Monitor</h1>
        <p style="color: var(--text-dim)">Присоединяйся к учебной сессии</p>
        <button onclick="signIn()" class="btn btn-start btn-full" style="background: var(--accent); color: #000;">
            <i class="fab fa-google"></i> Войти через Google
        </button>
    </div>

    <div id="mainBlock" class="hidden">
        <div class="card">
            <div class="timer-header" id="userNameDisplay">Учебная сессия</div>
            <div class="timer-val" id="timer">00:00:00</div>
            
            <div class="controls-grid">
                <button onclick="togglePause()" id="pauseBtn" class="btn btn-start">
                    <i class="fas fa-play"></i> Продолжить
                </button>
                <button onclick="finishSession()" class="btn btn-stop">
                    <i class="fas fa-square"></i> Завершить
                </button>
                <button onclick="signOut()" class="btn btn-exit btn-full">Выход</button>
            </div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('rating')"><i class="fas fa-trophy"></i> Рейтинг</button>
            <button class="tab-btn" onclick="switchTab('achievements')"><i class="fas fa-award"></i> Достижения</button>
        </div>

        <div id="tab-rating" class="card" style="margin-top:15px">
            <div id="ratingList">Загрузка рейтинга...</div>
        </div>

        <div id="tab-achievements" class="card hidden" style="margin-top:15px">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>Все достижения</h3>
                <span id="achCounter" style="color:var(--accent); font-weight:bold">0/5</span>
            </div>
            <div class="achievements-grid" id="achievementsGrid">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;
    let totalSeconds = 0;
    let sessionSeconds = 0;
    let isPaused = true;

    const ACH_DATA = {
        'first_step': { icon: '🌱', title: 'Первый шаг', desc: 'Провел первую сессию' },
        'return':     { icon: '🔄', title: 'Возвращение', desc: 'Учеба после перерыва' },
        'marathon':   { icon: '⚡', title: 'Легенда', desc: 'Сессия более 2 часов' },
        'activist':   { icon: '📢', title: 'Активист', desc: 'Написал 20 сообщений' },
        'workaholic': { icon: '💼', title: 'Трудоголик', desc: '5 часов суммарно' }
    };

    // --- СИСТЕМА ВКЛАДОК ---
    window.switchTab = (tabName) => {
        document.getElementById('tab-rating').classList.toggle('hidden', tabName !== 'rating');
        document.getElementById('tab-achievements').classList.toggle('hidden', tabName !== 'achievements');
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.innerText.toLowerCase().includes(tabName === 'rating' ? 'рейт' : 'достиж'));
        });
    };

    // --- ЛОГИКА ТАЙМЕРА ---
    window.togglePause = () => {
        isPaused = !isPaused;
        const btn = document.getElementById('pauseBtn');
        btn.innerHTML = isPaused ? '<i class="fas fa-play"></i> Продолжить' : '<i class="fas fa-pause"></i> Пауза';
        btn.style.borderColor = isPaused ? 'var(--success)' : 'var(--warning)';
        btn.style.color = isPaused ? 'var(--success)' : 'var(--warning)';
    };

    // ГЛАВНАЯ ФУНКЦИЯ: ЗАВЕРШИТЬ (Исправленная)
    window.finishSession = async () => {
        if (sessionSeconds < 1) return alert("Сессия слишком короткая!");
        
        const btn = document.querySelector('.btn-stop');
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;

        try {
            await saveToDatabase();
            alert(`Успешно! Вы проучились ${formatTime(sessionSeconds)}`);
            sessionSeconds = 0;
            isPaused = true;
            document.getElementById('pauseBtn').innerHTML = '<i class="fas fa-play"></i> Продолжить';
            await fetchRating();
        } catch (e) {
            alert("Ошибка сохранения");
        } finally {
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    };

    async function saveToDatabase() {
        if (!user) return;
        
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        let achs = profile.achievements || [];

        // Логика достижений
        if (!achs.includes('first_step')) achs.push('first_step');
        if (sessionSeconds > 7200 && !achs.includes('marathon')) achs.push('marathon');
        if (totalSeconds > 18000 && !achs.includes('workaholic')) achs.push('workaholic');

        await supabase.from('profiles').update({
            study_seconds: totalSeconds,
            last_seen: new Date().toISOString(),
            achievements: achs
        }).eq('id', user.id);

        renderAchievements(achs);
    }

    // --- РЕНДЕРИНГ ---
    function renderAchievements(unlocked) {
        const grid = document.getElementById('achievementsGrid');
        grid.innerHTML = Object.entries(ACH_DATA).map(([id, data]) => `
            <div class="ach-item ${unlocked.includes(id) ? 'unlocked' : ''}">
                <i class="fas fa-lock lock-icon"></i>
                <span class="ach-icon">${data.icon}</span>
                <span class="ach-title">${data.title}</span>
                <span class="ach-desc">${data.desc}</span>
            </div>
        `).join('');
        document.getElementById('achCounter').innerText = `${unlocked.length}/5`;
    }

    async function fetchRating() {
        const { data } = await supabase.from('profiles').select('*').order('study_seconds', { ascending: false }).limit(10);
        document.getElementById('ratingList').innerHTML = data.map((u, i) => `
            <div class="rank-item">
                <div class="rank-info">
                    <span class="rank-pos">${i+1}</span>
                    <div class="avatar" style="width:35px; height:35px; font-size:1rem">${(u.username || u.email)[0].toUpperCase()}</div>
                    <b>${u.username || u.email.split('@')[0]}</b>
                </div>
                <span style="color:var(--success); font-weight:bold">${formatTime(u.study_seconds)}</span>
            </div>
        `).join('');
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    async function init() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            user = data.user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('mainBlock').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = user.email;

            const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (p) {
                totalSeconds = p.study_seconds || 0;
                renderAchievements(p.achievements || []);
            }

            setInterval(() => {
                if (!isPaused) {
                    totalSeconds++;
                    sessionSeconds++;
                    document.getElementById('timer').innerText = formatTime(sessionSeconds);
                    if (totalSeconds % 30 === 0) saveToDatabase();
                }
            }, 1000);
        }
        fetchRating();
    }

    window.signIn = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    window.signOut = async () => { await supabase.auth.signOut(); location.reload(); };

    init();
</script>
</body>
</html>
