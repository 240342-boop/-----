<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Замени на свои данные из настроек проекта Supabase (Project Settings -> API)
    const SUPABASE_URL = 'https://tcnmxalzmfveerioxlha.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ngHUhvlyl_Hmrb_C4DH5Uw_YdhDlK07';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentTab = 'feed';
    let channel = null; // Для Realtime подписки

    // Функция для создания общего ID чата
    function getChatId(email1, email2) {
        return [email1.toLowerCase(), email2.toLowerCase()].sort().join('_');
    }

    // Слушатель состояния авторизации
    supabase.auth.onAuthStateChanged((event, session) => {
        const user = session?.user;
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'flex';
            document.getElementById('userName').innerText = user.user_metadata.full_name;
            document.getElementById('userPhoto').src = user.user_metadata.avatar_url;
            loadData();
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messageForm').style.display = 'none';
            document.getElementById('feed').innerHTML = "Войдите, чтобы видеть чат";
        }
    });

    // Вход и Выход
    document.getElementById('loginBtn').onclick = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    document.getElementById('logoutBtn').onclick = () => supabase.auth.signOut();

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (event) event.target.classList.add('active');
        document.getElementById('recipientArea').style.display = (tab === 'dm') ? 'block' : 'none';
        loadData();
    };

    document.getElementById('recipientEmail').oninput = () => {
        if(currentTab === 'dm') loadData();
    };

    // Отправка сообщения
    document.getElementById('mainBtn').onclick = async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        const text = document.getElementById('content').value.trim();
        const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
        
        if (!text) return;
        if (currentTab === 'dm' && !recipient) return alert("Укажите Email!");

        const isDM = currentTab === 'dm';
        const table = isDM ? "messages" : "requests";
        const myEmail = user.email.toLowerCase();

        const messageData = {
            name: user.user_metadata.full_name,
            email: myEmail,
            photo: user.user_metadata.avatar_url,
            text: text,
            // timestamp в Postgres создается автоматически (column default: now())
        };

        if (isDM) {
            messageData.recipient_email = recipient;
            messageData.chat_id = getChatId(myEmail, recipient);
        }

        const { error } = await supabase.from(table).insert([messageData]);
        
        if (error) {
            console.error("Ошибка Supabase:", error);
            alert("Ошибка: " + error.message);
        } else {
            document.getElementById('content').value = "";
        }
    };

    // Загрузка и Realtime
    async function loadData() {
        // Очищаем старую подписку если есть
        if (channel) supabase.removeChannel(channel);

        const { data: { user } } = await supabase.auth.getUser();
        const feed = document.getElementById('feed');
        const recipient = document.getElementById('recipientEmail').value.trim().toLowerCase();
        
        const table = (currentTab === 'dm') ? "messages" : "requests";
        
        // 1. Первоначальная загрузка данных
        let query = supabase.from(table).select('*').order('created_at', { ascending: true });

        if (currentTab === 'dm') {
            if (!recipient) {
                feed.innerHTML = "<p style='text-align:center; color:#999;'>Введите email...</p>";
                return;
            }
            query = query.eq('chat_id', getChatId(user.email, recipient));
        } else {
            query = query.limit(50);
        }

        const { data, error } = await query;
        if (error) return console.error(error);
        
        renderMessages(data, user);

        // 2. Подписка на новые сообщения (Realtime)
        channel = supabase.channel('public:' + table)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: table }, (payload) => {
                // Просто перезагружаем данные для простоты или пушим в массив
                loadData(); 
            })
            .subscribe();
    }

    function renderMessages(messages, user) {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        messages.forEach(msg => {
            const isMine = msg.email === user.email.toLowerCase();
            const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'sent' : 'received'}`;
            div.innerHTML = `
                ${!isMine && currentTab === 'feed' ? `<small><b>${msg.name}</b></small><br>` : ''}
                ${msg.text}
                <span class="msg-info">${time}</span>
            `;
            feed.appendChild(div);
        });
        feed.scrollTop = feed.scrollHeight;
    }
</script>
